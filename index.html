<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק מה הקשר - קשרים</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        .container { width: 90%; max-width: 450px; padding: 20px; text-align: center; }
        h1 { color: #1a1a1a; margin-top: 0; font-size: 24px; }
        .hidden { display: none !important; }

        /* --- Admin Screen Style --- */
        #admin-screen .group { border: 1px solid #ddd; padding: 15px; border-radius: 12px; background: white; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: right; }
        #admin-screen h2 { margin-top: 0; margin-bottom: 15px; color: #555; font-size: 16px; font-weight: bold;}
        #admin-screen input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        #create-link-btn { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 20px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;}
        #final-link-box { background: white; border: 2px solid #2ecc71; color: #27ae60; padding: 15px; border-radius: 12px; margin-top: 10px; word-break: break-all; font-weight: bold; text-align: center;}
        #game-url { text-align: left; direction: ltr; background: #f8f9fa; border: 1px dashed #2ecc71;}

        /* --- Game Screen Style --- */
        #game-header { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 10px; width: 100%; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; background: white; border-radius: 15px; padding: 10px 15px; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.05);}
        #shuffle-btn { background: white; color: black; border: 1px solid black; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold;}
        #check-btn { font-size: 18px; font-weight: bold; color: #1a1a1a; cursor: pointer; border: 1px solid black; padding: 8px 20px; border-radius: 20px; background: white;}
        #attempts-label { color: #d93025; font-weight: bold; font-size: 14px; text-align: left; }
        
        .words-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .word-cell { aspect-ratio: 1; background: #93c5fd; color: black; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; cursor: pointer; transition: all 0.2s; user-select: none; text-align: center; padding: 5px; box-sizing: border-box;}
        .word-cell.selected { background: #5a6268 !important; color: white !important;}
        
        .completed-group { grid-column: span 4; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 10px; border-radius: 8px; padding: 15px; text-align: center; aspect-ratio: auto; min-height: 80px;}
        .completed-category { font-weight: bold; font-size: 18px; margin-bottom: 5px; text-transform: uppercase;}
        .completed-words { font-size: 14px;}
        
        .difficulty-green { background: #a7f3d0; color: #065f46;}
        .difficulty-yellow { background: #fef08a; color: #854d0e;}
        .difficulty-orange { background: #fed7aa; color: #9a3412;}
        .difficulty-red { background: #fecaca; color: #991b1b;}

        #instructions-small { color: #dc2626; font-size: 14px; margin-top: 20px; font-weight: bold;}
        .menu-buttons { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; width: 100%;}
        .menu-btn { background: white; color: black; border: 1px solid black; padding: 10px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; flex: 1;}

        /* --- Popup Instructions --- */
        #how-to-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;}
        .popup-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: right; position: relative; max-height: 80vh; overflow-y: auto;}
        .close-popup { position: absolute; top: 15px; left: 15px; font-size: 24px; color: #999; cursor: pointer;}
        #how-to-popup h2 { text-align: center; margin-top: 0;}
    </style>
</head>
<body>

<div class="container">

                <input type="hidden" class="diff-input" value="green">
                <input type="text" placeholder="מה הקשר? (הקטגוריה)" class="cat-input">
