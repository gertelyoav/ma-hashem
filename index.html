<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק מה הקשר - הגדרת משחק</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; color: #333; box-sizing: border-box;}
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a1a1a; margin-top: 0; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 25px; }
        
        .group { border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 20px; background: #fafafa; }
        .group h2 { margin-top: 0; font-size: 16px; margin-bottom: 10px; }
        
        /* הצבעים של הקבוצות */
        .group-green { border-right: 5px solid #10b981; }
        .group-yellow { border-right: 5px solid #facc15; }
        .group-orange { border-right: 5px solid #fb923c; }
        .group-red { border-right: 5px solid #ef4444; }

        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; font-family: inherit;}
        .words-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        #create-btn { background: #3498db; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        #create-btn:hover { background: #2980b9; }

        .hidden { display: none !important; }
        
        #link-section { margin-top: 20px; padding: 15px; background: #e8f5e9; border: 1px solid #4caf50; border-radius: 10px; text-align: center; }
        #link-section input { direction: ltr; text-align: left; background: white; border: 1px dashed #4caf50; color: #2e7d32; font-weight: bold; margin-top: 10px;}
        
        /* ------------------ GAME SCREEN STYLES ------------------ */
        #game-screen { width: 100%; max-width: 500px; }
        #game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .game-btn { padding: 8px 15px; border: 1px solid #333; border-radius: 20px; background: white; cursor: pointer; font-weight: bold; }
        #attempts { color: #d93025; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .cell { background: #93c5fd; color: black; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; border-radius: 8px; cursor: pointer; user-select: none; font-size: 14px; padding: 2px;}
        .cell.selected { background: #4b5563; color: white; }
        
        .solved-group { grid-column: span 4; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .solved-cat { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .solved-words { font-size: 14px; }
        
        .bg-green { background: #a7f3d0; color: #065f46; }
        .bg-yellow { background: #fef08a; color: #854d0e; }
        .bg-orange { background: #fed7aa; color: #9a3412; }
        .bg-red { background: #fecaca; color: #991b1b; }
    </style>
</head>
<body>

<div id="admin-screen" class="container">
    <h1>הגדרה: "מה הקשר?"</h1>
    <p class="subtitle">אמא, מלאי 4 קבוצות של 4 מילים והקשר ביניהן:</p>

    <div class="group group-green">
        <h2>קבוצה 1 (קשר קל - ירוק)</h2>
        <input type="hidden" class="diff" value="green">
        <input type="text" class="cat" placeholder="מה הקשר? (למשל: סוגי עוגות)">
        <div class="words-container">
            <input type="text" class="word" placeholder="מילה 1">
            <input type="text" class="word" placeholder="מילה 2">
            <input type="text" class="word" placeholder="מילה 3">
            <input type="text" class="word" placeholder="מילה 4">
        </div>
    </div>

    <div class="group group-yellow">
        <h2>קבוצה 2 (קל בינוני - צהוב)</h2>
        <input type="hidden" class="diff" value="yellow">
        <input type="text" class="cat" placeholder="מה הקשר?">
        <div class="words-container">
            <input type="text" class="word" placeholder="מילה 1">
            <input type="text" class="word" placeholder="מילה 2">
            <input type="text" class="word" placeholder="מילה 3">
            <input type="text" class="word" placeholder="מילה 4">
        </div>
    </div>

    <div class="group group-orange">
        <h2>קבוצה 3 (בינוני - כתום)</h2>
        <input type="hidden" class="diff" value="orange">
        <input type="text" class="cat" placeholder="מה הקשר?">
        <div class="words-container">
            <input type="text" class="word" placeholder="מילה 1">
            <input type="text" class="word" placeholder="מילה 2">
            <input type="text" class="word" placeholder="מילה 3">
            <input type="text" class="word" placeholder="מילה 4">
        </div>
    </div>

    <div class="group group-red">
        <h2>קבוצה 4 (קשה - אדום)</h2>
        <input type="hidden" class="diff" value="red">
        <input type="text" class="cat" placeholder="מה הקשר?">
        <div class="words-container">
            <input type="text" class="word" placeholder="מילה 1">
            <input type="text" class="word" placeholder="מילה 2">
            <input type="text" class="word" placeholder="מילה 3">
            <input type="text" class="word" placeholder="מילה 4">
        </div>
    </div>

    <button id="create-btn" onclick="generateLink()">צור לינק למשחק!</button>

    <div id="link-section" class="hidden">
        <div>הלינק מוכן! לחצי עליו כדי להעתיק, ושלחי אותו לשחקנים:</div>
        <input type="text" id="final-url" readonly onclick="this.select(); document.execCommand('copy'); alert('הלינק הועתק!');">
        <button class="game-btn" style="margin-top:10px; width:100%; background:#4caf50; color:white; border:none;" onclick="startFromCurrent()">התחל לשחק מכאן (מבלי לשלוח לינק)</button>
    </div>
</div>

<div id="game-screen" class="container hidden">
    <div id="game-header">
        <button class="game-btn" onclick="renderGrid()">🔀 ערבוב</button>
        <button class="game-btn" onclick="checkSelected()">✈ בדיקה</button>
        <div id="attempts">ניסיונות
